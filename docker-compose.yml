# Docker Compose for mcp-geo server
# Usage:
#   stdio mode:  docker compose run --rm mcp-geo
#   HTTP mode:   docker compose up
#   SSE mode:    docker compose --profile sse up

services:
  mcp-geo:
    build: .
    environment:
      - GEO_MCP_ORS_API_KEY=${GEO_MCP_ORS_API_KEY:-}
      - GEO_MCP_NOMINATIM_URL=${GEO_MCP_NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      - GEO_MCP_OSRM_URL=${GEO_MCP_OSRM_URL:-https://router.project-osrm.org}
      - GEO_MCP_OVERPASS_URL=${GEO_MCP_OVERPASS_URL:-https://overpass-api.de/api/interpreter}
    volumes:
      - ./data:/app/data:ro
    command: ["mcp-geo"]

  mcp-geo-http:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEO_MCP_ORS_API_KEY=${GEO_MCP_ORS_API_KEY:-}
      - GEO_MCP_NOMINATIM_URL=${GEO_MCP_NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      - GEO_MCP_OSRM_URL=${GEO_MCP_OSRM_URL:-https://router.project-osrm.org}
      - GEO_MCP_OVERPASS_URL=${GEO_MCP_OVERPASS_URL:-https://overpass-api.de/api/interpreter}
    volumes:
      - ./data:/app/data:ro
    command: ["mcp-geo", "--http", "--host", "0.0.0.0", "--port", "8000"]
